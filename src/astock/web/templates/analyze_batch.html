{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto space-y-4">
  <h1 class="text-xl font-semibold">批量 AI 分析</h1>
  <p class="text-xs text-gray-500">从持仓多选 或 手工填代码，一起流式分析。最多同时跑 8 只（避免过度消耗）。同一只当天有缓存直接显示。</p>

  <form method="post" action="/analyze/batch" class="card p-6 space-y-4">
    {% if holdings %}
    <div>
      <div class="text-xs text-gray-400 mb-2">持仓中挑选：</div>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
        {% for h in holdings %}
        <label class="flex items-center gap-2 text-sm p-2 rounded hover:bg-gray-800 cursor-pointer">
          <input type="checkbox" name="codes" value="{{ h.code }}" class="accent-red-500">
          <span class="font-semibold">{{ h.name }}</span>
          <span class="font-mono text-xs text-gray-500">{{ h.code }}</span>
        </label>
        {% endfor %}
      </div>
    </div>
    {% endif %}

    <div>
      <label class="block text-xs text-gray-400 mb-1">或手工填代码（逗号 / 换行分隔）</label>
      <textarea name="custom" rows="3"
                placeholder="600519, 300750&#10;002230"
                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white font-mono text-sm"></textarea>
    </div>

    <div class="flex justify-end pt-2 border-t border-gray-800">
      <button type="submit" class="btn btn-primary">开始批量分析</button>
    </div>
  </form>
</div>
{% endblock %}
