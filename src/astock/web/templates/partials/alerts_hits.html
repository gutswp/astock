{% from "_macros.html" import pct %}
{% if hits %}
<div class="card border-red-800 overflow-hidden">
  <div class="px-5 py-3 bg-red-950/40 border-b border-red-800 text-up font-semibold">
    ⚠️ 触发 {{ hits|length }} 条预警
  </div>
  <table class="data">
    <thead>
      <tr>
        <th>代码</th>
        <th>名称</th>
        <th>类型</th>
        <th class="text-right">现价</th>
        <th class="text-right">涨跌%</th>
        <th>信息</th>
      </tr>
    </thead>
    <tbody>
      {% for h in hits %}
      <tr>
        <td class="font-mono text-xs">{{ h.code }}</td>
        <td class="font-semibold">{{ h.name }}</td>
        <td class="text-xs"><span class="badge">{{ h.type }}</span></td>
        <td class="text-right num">{{ "%.2f"|format(h.price) }}</td>
        <td class="text-right">{{ pct(h.change_pct) }}</td>
        <td class="text-sm">{{ h.message }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="card p-4 text-center text-gray-500 text-sm">✓ 无预警触发</div>
{% endif %}
