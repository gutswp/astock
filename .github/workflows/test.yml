name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project
        run: |
          uv venv --python 3.11
          uv pip install -e .
          uv pip install pytest

      - name: Run pytest
        run: uv run pytest tests/ -v
