scan:
  min_market_cap: 20         # 最低市值（亿元），过滤小盘
  exclude_st: true
  exclude_limit_up: true     # 排除涨停（追不进）
  max_results: 30

  signals:
    macd_golden_cross: true
    volume_ratio_min: 2.0    # 量比阈值
    ma_breakthrough:         # 突破均线
      - 5
      - 10
      - 20
      - 60
    fund_flow_min: 5000      # 主力净流入最低（万元）
    rsi_oversold_reversal: true    # RSI < 30 反弹
    kdj_golden_cross: true         # 低位 KDJ 金叉
    boll_lower_bounce: true        # 布林下轨反弹
    cci_oversold_reversal: false   # CCI < -100 反弹（可开）
    dmi_golden_cross: false        # +DI 上穿 -DI 且 ADX ≥ 20（可开）
    sar_bullish_flip: false        # SAR 翻多（可开）

  composite_scoring: false         # 综合评分：叠加行业板块资金流（打开会拉行业+板块流，多约 5-10s）

ai:
  model: claude-sonnet-4-6
  max_tokens: 2000

cache:
  spot_ttl_seconds: 60       # 实时行情缓存 1 分钟
  hist_ttl_seconds: 86400    # 日线缓存 1 天
  industry_ttl_seconds: 604800  # 行业缓存 7 天

# 后台预警守护（仅 web 起时生效）
alert_daemon:
  enabled: false             # 默认关，避免市场时段外反复推送
  interval_seconds: 300      # 每 5 分钟扫一次关注池
  dedup_window_seconds: 3600 # 同一 (code,type,round(price,1)) 1 小时内只推一次

# 持仓风险监控（跟 alert_daemon 同一循环，通过其 enabled 生效）
position_monitor:
  enabled: false             # 默认关
  stop_loss_pct: -20         # 亏损达 20% 触发
  take_profit_pct: 30        # 盈利达 30% 触发（提示止盈机会）
  big_move_pct: 7            # 单日绝对涨跌 ≥ 7% 触发

# 推送通道（预警触发时使用，也可推 AI 报告完成）
notify:
  serverchan:
    enabled: false
    sendkey: ""              # https://sct.ftqq.com
  mail:
    enabled: false
    smtp_host: smtp.qq.com
    smtp_port: 465
    use_ssl: true
    user: ""                 # 发件人邮箱
    password: ""             # SMTP 授权码（不是登录密码）
    to: ""                   # 收件人
  # AI 报告推送：advise/review 完成时把 markdown 内容发到 Server 酱/邮件
  push_ai_reports:
    advise: false            # 决策报告完成时推
    review: false            # 复盘报告完成时推
